name: update-cask
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump cask to the latest mister-companion release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          CASK=Casks/mister-companion.rb
          TAG=$(gh release view --repo hudsonbrendon/mister-companion --json tagName --jq .tagName)
          VERSION=${TAG#v}
          CURRENT=$(grep -m1 'version "' "$CASK" | sed -E 's/.*version "([^"]+)".*/\1/')
          echo "latest=$VERSION current=$CURRENT"
          if [ "$VERSION" = "$CURRENT" ]; then
            echo "Cask already up to date."
            exit 0
          fi
          URL="https://github.com/hudsonbrendon/mister-companion/releases/download/v${VERSION}/MiSTer-Companion-${VERSION}-arm64.dmg"
          curl -fsSL "$URL" -o /tmp/app.dmg
          SHA=$(shasum -a 256 /tmp/app.dmg | awk '{print $1}')
          sed -i '' -E "s/version \"[^\"]+\"/version \"${VERSION}\"/" "$CASK"
          sed -i '' -E "s/sha256 \"[0-9a-f]+\"/sha256 \"${SHA}\"/" "$CASK"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CASK"
          git commit -m "chore: update mister-companion to ${VERSION}"
          git push
